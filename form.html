<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Business Visit Entry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        /* General body styling */
        body {
            background: linear-gradient(135deg, #e0f7fa, #80deea);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 40px 20px;
        }

        /* Container for form */
        .container {
            max-width: 720px;
            background-color: #ffffffcc;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
            padding: 40px 35px 50px 35px;
            backdrop-filter: saturate(180%) blur(15px);
            transition: box-shadow 0.3s ease;
            width: 100%;
        }
        .container:hover {
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.18);
        }

        /* Section styling */
        .form-section {
            background-color: #f8fcff;
            border-radius: 15px;
            padding: 25px 30px;
            margin-bottom: 30px;
            border: 1.5px solid #00acc1;
            box-shadow: 0 6px 12px rgba(0, 172, 193, 0.12);
        }

        /* Section header */
        .section-title {
            color: #007c91;
            font-weight: 700;
            font-size: 1.5rem;
            margin-bottom: 25px;
            border-bottom: 3px solid #0097a7;
            padding-bottom: 12px;
            letter-spacing: 0.03em;
        }

        /* Form label */
        .form-label {
            font-weight: 600;
            color: #004d56;
            letter-spacing: 0.02em;
            margin-bottom: 6px;
            display: block;
        }

        /* Input styling */
        .form-control {
            border-radius: 12px;
            border: 2px solid #b2ebf2;
            background-color: #e0f7fa;
            padding: 12px 15px;
            font-size: 1rem;
            color: #004d56;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 5px rgba(0, 172, 193, 0.1);
        }
        .form-control:focus {
            border-color: #007c91;
            background-color: #d0f0fb;
            box-shadow: 0 0 8px #0097a7;
            outline: none;
            color: #00343f;
        }
        textarea.form-control {
            resize: vertical;
            min-height: 80px;
        }

        /* Buttons styling */
        .btn {
            border-radius: 30px;
            padding: 12px 32px;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.05em;
            transition: background-color 0.3s ease, transform 0.15s ease;
            box-shadow: 0 4px 15px rgba(0, 156, 187, 0.3);
        }

        .btn-primary {
            background: linear-gradient(45deg, #0097a7, #006064);
            border: none;
            color: #e0f7fa;
            box-shadow: 0 6px 18px rgba(0, 151, 167, 0.5);
        }
        .btn-primary:hover,
        .btn-primary:focus {
            background: linear-gradient(45deg, #00bcd4, #004d40);
            color: white;
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 188, 212, 0.6);
            outline: none;
        }

        .btn-secondary {
            background-color: #00acc1;
            color: white;
            border: none;
            box-shadow: 0 3px 10px rgba(0, 172, 193, 0.5);
        }
        .btn-secondary:hover,
        .btn-secondary:focus {
            background-color: #00838f;
            color: #e0f7fa;
            box-shadow: 0 5px 15px rgba(0, 131, 143, 0.6);
            transform: scale(1.03);
            outline: none;
        }

        /* Navbar styling */
        .navbar {
            background: #006064;
            border-radius: 30px;
            width: 100%;
            max-width: 720px;
            margin-bottom: 40px;
            padding: 15px 30px;
            box-shadow: 0 8px 30px rgba(0, 96, 100, 0.4);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar-brand {
            font-weight: 900;
            color: #e0f7fa !important;
            font-size: 1.75rem;
            letter-spacing: 0.1em;
        }
        .navbar .btn-light {
            background-color: #b2ebf2;
            color: #004d56;
            font-weight: 600;
            border-radius: 25px;
            padding: 8px 25px;
            box-shadow: 0 3px 8px rgba(0, 157, 177, 0.4);
            transition: background-color 0.3s ease;
        }
        .navbar .btn-light:hover {
            background-color: #80deea;
            color: #00343f;
            box-shadow: 0 5px 15px rgba(0, 188, 212, 0.7);
        }

        /* Responsive tweaks */
        @media (max-width: 600px) {
            .form-section {
                padding: 20px 15px;
            }
            .navbar {
                flex-direction: column;
                gap: 15px;
                padding: 15px 15px;
            }
            .navbar-brand {
                font-size: 1.5rem;
                text-align: center;
            }
            .navbar .btn-light {
                width: 100%;
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <span class="navbar-brand">Business Visit Entry System</span>
        <a href="/view" class="btn btn-light">View Records</a>
    </nav>

    <div class="container">
        <form id="visitForm" class="needs-validation" novalidate>
            <div class="form-section">
                <h4 class="section-title">Company Information</h4>
                <div class="mb-3">
                    <label class="form-label">Company Name</label>
                    <input type="text" class="form-control" name="company_name" required />
                </div>
            </div>

            <div class="form-section">
                <h4 class="section-title">Primary Contact</h4>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Contact Person Name</label>
                        <input type="text" class="form-control" name="primary_contact_name" required />
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Position</label>
                        <input type="text" class="form-control" name="primary_contact_position" required />
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Contact Number</label>
                        <input type="tel" class="form-control" name="primary_contact_number" required />
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" name="primary_email" required />
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h4 class="section-title">Secondary Contact</h4>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Contact Person Name</label>
                        <input type="text" class="form-control" name="secondary_contact_name" />
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Position</label>
                        <input type="text" class="form-control" name="secondary_contact_position" />
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Contact Number</label>
                        <input type="tel" class="form-control" name="secondary_contact_number" />
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" name="secondary_email" />
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h4 class="section-title">Visit Details</h4>
                <div class="mb-3">
                    <label class="form-label">Purpose of Visit</label>
                    <textarea class="form-control" name="purpose" rows="3" required></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Meeting Outcome</label>
                    <textarea class="form-control" name="outcome" rows="3" required></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Follow-up Actions</label>
                    <textarea class="form-control" name="followup" rows="3" required></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Next Meeting Date</label>
                    <input type="date" class="form-control" name="next_date" required />
                </div>
                <div class="mb-3">
                    <label class="form-label">Additional Notes</label>
                    <textarea class="form-control" name="notes" rows="3"></textarea>
                </div>
            </div>

            <div class="form-section">
                <h4 class="section-title">Location</h4>
                <div class="mb-3">
                    <input type="text" class="form-control" name="location" id="location" readonly />
                    <button type="button" class="btn btn-secondary mt-2" onclick="getLocation()">Get Current Location</button>
                    <div id="location-status" class="text-muted mt-2"></div>
                </div>
            </div>

            <div class="text-center mt-4">
                <button type="submit" class="btn btn-primary btn-lg me-2">Save Record</button>
            </div>
        </form>
    </div>

    <script>
        function getLocation() {
            const locationInput = document.getElementById('location');
            const statusDiv = document.getElementById('location-status');

            if (!navigator.geolocation) {
                statusDiv.textContent = 'Geolocation is not supported by your browser.';
                return;
            }

            statusDiv.textContent = 'Locating…';
            locationInput.value = '';

            navigator.geolocation.getCurrentPosition(success, error, {timeout: 10000});

            function success(position) {
                const latitude = position.coords.latitude.toFixed(6);
                const longitude = position.coords.longitude.toFixed(6);

                locationInput.value = `${latitude}, ${longitude}`;
                statusDiv.textContent = `Coordinates found: Latitude ${latitude}, Longitude ${longitude}`;

                // Reverse geocode with Nominatim OpenStreetMap
                fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${latitude}&lon=${longitude}`)
                    .then(response => response.json())
                    .then(data => {
                        if (data.address) {
                            const addr = data.address;
                            const addressString = [
                                addr.road || '',
                                addr.house_number || '',
                                addr.city || addr.town || addr.village || '',
                                addr.state || '',
                                addr.country || ''
                            ].filter(Boolean).join(', ');
                            locationInput.value = addressString || locationInput.value;
                            statusDiv.textContent = `Location found: ${addressString}`;
                        }
                    })
                    .catch(() => {
                        // Ignore reverse geocoding failure silently
                    });
            }

            function error(err) {
                locationInput.value = '';
                switch(err.code) {
                    case err.PERMISSION_DENIED:
                        statusDiv.textContent = "User denied the request for Geolocation.";
                        break;
                    case err.POSITION_UNAVAILABLE:
                        statusDiv.textContent = "Location information is unavailable.";
                        break;
                    case err.TIMEOUT:
                        statusDiv.textContent = "The request to get user location timed out.";
                        break;
                    default:
                        statusDiv.textContent = "An unknown error occurred.";
                        break;
                }
            }
        }

        document.getElementById('visitForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const submitBtn = this.querySelector('button[type="submit"]');
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Saving...';
            submitBtn.disabled = true;

            const formData = new FormData(this);

            fetch('/submit', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.json();
            })
            .then(data => {
                if (data.success) {
                    alert('Record saved successfully!');
                    window.location.href = '/view';  // Redirect to view page after success
                } else {
                    throw new Error(data.error || 'Failed to save record');
                }
            })
            .catch(error => {
                alert('Error saving record: ' + error.message);
                console.error('Error:', error);
            })
            .finally(() => {
                submitBtn.innerHTML = 'Save Record';
                submitBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
